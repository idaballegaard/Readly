name: Readly CI/CD

on:
  push:
    branches: [main, cleanup]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
    
jobs:
  frontend-integration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Run unit tests
        run: npm run test:unit
        working-directory: frontend

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build frontend (for test)
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
          VITE_APP_BASE_PATH: /${{ github.event.repository.name }}-TEST/
        working-directory: frontend

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Build frontend (for prod)
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
          VITE_APP_BASE_PATH: /${{ github.event.repository.name }}/
        working-directory: frontend

  backend-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install
        working-directory: backend

      - name: Run unit tests
        run: npm run test:unit
        working-directory: backend




  complete:
    if: false
    runs-on: ubuntu-latest
    environment: Test

    steps:

      - name: Deliver to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deliver to Render
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}
          wait-for-success: true

      - name: Run Playwright (Backend)
        run: npm run test
        env:
          DBHOST: ${{ secrets.DBHOST }}
          BASE_URL: ${{ vars.API_BASE_URL }}
          TOKEN_SECRET: ${{ secrets.TOKEN_SECRET }}
        working-directory: backend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run Playwright (Frontend)
        run: npm run test:e2e
        env:
          DBHOST: ${{ secrets.DBHOST }}
          BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          TOKEN_SECRET: ${{ secrets.TOKEN_SECRET }}
        working-directory: frontend