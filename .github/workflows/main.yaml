name: Readly CI/CD

on:
  push:
    branches: [main, cleanup]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
    
jobs:
  frontend-integration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Run unit tests
        run: npm run test:unit
        working-directory: frontend

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build frontend (for test)
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
          VITE_APP_BASE_PATH: /${{ github.event.repository.name }}-TEST/
        working-directory: frontend

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages-test
          path: frontend/dist

      - name: Build frontend (for prod)
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
          VITE_APP_BASE_PATH: /${{ github.event.repository.name }}/
        working-directory: frontend
      
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages-prod
          path: frontend/dist

      - name: Upload frontend
        uses: actions/upload-artifact@v5
        with:
          name: frontend
          path: frontend

  backend-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install
        working-directory: backend

      - name: Run unit tests
        run: npm run test:unit
        working-directory: backend

      - name: Upload backend
        uses: actions/upload-artifact@v5
        with:
          name: backend
          path: backend

  frontend-delivery:
    runs-on: ubuntu-latest
    needs: [ frontend-integration ]
    steps:
      - name: Deliver to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-test

  backend-delivery:
    runs-on: ubuntu-latest
    needs: [ backend-integration ]
    environment: Test
    steps:
      - name: Deliver to Render
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}
          wait-for-success: true

  # e2e-test:
  #   runs-on: ubuntu-latest
  #   needs: [ frontend-delivery, backend-delivery ]
  #   steps:
  #     - name: Download backend artifact
  #       uses: actions/download-artifact@v5
  #       with:
  #         name: backend
  #         path: backend

  #     - name: Install backend dependencies
  #       run: npm install
  #       working-directory: backend

  #     - name: Run E2E tests
  #       run: npm run test
  #       env:
  #         DBHOST: ${{ secrets.DBHOST }}
  #         BASE_URL: ${{ vars.API_BASE_URL }}
  #         TOKEN_SECRET: ${{ secrets.TOKEN_SECRET }}
  #       working-directory: backend

  ui-test:
    runs-on: ubuntu-latest
    # needs: [e2e-test]
    needs: [frontend-delivery, backend-delivery]
    environment: Test
    steps:      
      - name: Download frontend artifact
        uses: actions/download-artifact@v5
        with:
          name: frontend
          path: frontend

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run UI tests
        run: npm run test:e2e
        env:
          DBHOST: ${{ secrets.DBHOST }}
          BASE_URL: ${{ vars.API_BASE_URL }}
          TOKEN_SECRET: ${{ secrets.TOKEN_SECRET }}
        working-directory: frontend

  frontend-deploy:
    runs-on: ubuntu-latest
    environment: Production
    needs: [ui-test]
    steps:
      - name: Deliver to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-prod

  backend-deploy:
    runs-on: ubuntu-latest
    environment: Production
    needs: [ui-test]
    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v5
        with:
          name: frontend
          path: frontend

      - name: Download backend artifact
        uses: actions/download-artifact@v5
        with:
          name: backend
          path: backend

      - name: Deliver to Render
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}